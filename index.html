<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affirmation | Mindful Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #f43f5e;
            --morning-bg: linear-gradient(135deg, #fff9f2 0%, #ffecd2 100%);
            --afternoon-bg: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            --evening-bg: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .theme-morning { background: var(--morning-bg); color: #4338ca; }
        .theme-afternoon { background: var(--afternoon-bg); color: #1e293b; }
        .theme-evening { background: var(--evening-bg); color: #f1f5f9; }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        }

        .dark .glass-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .serif { font-family: 'Playfair Display', serif; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: float 20s infinite ease-in-out;
        }

        .fade-in {
            animation: fadeIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .pulse-accent {
            animation: pulse-accent 2s infinite;
        }

        @keyframes pulse-accent {
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }

        /* Custom Slider */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(0,0,0,0.1); border-radius: 10px; }
        .dark input[type=range]::-webkit-slider-runnable-track { background: rgba(255,255,255,0.1); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--accent); margin-top: -6px; cursor: pointer; box-shadow: 0 0 10px rgba(244, 63, 94, 0.4); }

        .btn-hover { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px var(--accent); }

        #notif-history::-webkit-scrollbar { width: 4px; }
        #notif-history::-webkit-scrollbar-thumb { background: rgba(244, 63, 94, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="theme-afternoon p-4 md:p-8">

    <!-- Dynamic Background Orbs -->
    <div class="orb w-[500px] h-[500px] bg-rose-200 top-[-10%] left-[-10%]"></div>
    <div class="orb w-[400px] h-[400px] bg-blue-200 bottom-[-10%] right-[-10%]" style="animation-delay: -5s;"></div>

    <div class="w-full max-w-4xl flex flex-col items-center gap-12 relative z-10">
        
        <header class="text-center space-y-4 fade-in">
            <div class="flex items-center justify-center gap-3 mb-2">
                <span id="time-icon" class="text-xl">☀️</span>
                <h1 id="greeting" class="text-xs md:text-sm uppercase tracking-[0.6em] font-bold opacity-60">Good Afternoon</h1>
            </div>
            <p class="serif text-6xl md:text-8xl font-bold tracking-tighter italic">Affirmation</p>
        </header>

        <!-- Main Display Card -->
        <div id="main-card" class="glass-card w-full rounded-[3rem] p-10 md:p-20 relative overflow-hidden flex flex-col justify-center min-h-[450px] transition-all duration-1000">
            <!-- Decorative Elements -->
            <div class="absolute top-10 left-12 serif text-9xl opacity-10 select-none">“</div>
            <div class="absolute bottom-10 right-12 serif text-9xl opacity-10 select-none rotate-180">“</div>
            
            <div id="content-area" class="relative z-10 text-center space-y-8">
                <div id="category-badge" class="inline-block px-4 py-1 rounded-full bg-rose-500/10 text-rose-500 text-[10px] font-bold uppercase tracking-widest mb-4">Growth</div>
                <p id="affirmation-text" class="serif text-3xl md:text-5xl lg:text-6xl leading-[1.1] font-medium italic transition-all duration-700">
                    Your light shines brightest when you are simply yourself.
                </p>
                
                <div class="pt-10 flex flex-wrap justify-center gap-6" id="controls">
                    <button onclick="speakAffirmation()" title="Speak aloud" class="p-5 rounded-2xl bg-white/50 dark:bg-slate-800/50 hover:bg-white dark:hover:bg-slate-800 transition-all text-slate-500 hover:text-rose-500 group">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    </button>
                    <button onclick="newAffirmation()" class="btn-hover px-10 py-5 rounded-2xl bg-slate-900 text-white dark:bg-white dark:text-slate-900 font-bold text-lg shadow-xl active:scale-95">
                        Reveal Next
                    </button>
                    <button onclick="testNotification()" title="Test Notification" class="p-5 rounded-2xl bg-white/30 dark:bg-slate-800/30 hover:bg-white transition-all text-slate-400 hover:text-amber-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/><path d="M12 4v10"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Controls Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl">
            <!-- Timer Card -->
            <div class="glass-card rounded-[2rem] p-8 space-y-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="font-bold text-lg">Reminders</h3>
                        <p class="text-xs opacity-50 font-medium uppercase tracking-tighter">Notification System</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="timer-toggle" class="sr-only peer">
                        <div class="w-14 h-8 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-rose-500"></div>
                    </label>
                </div>
                
                <div id="timer-settings" class="space-y-6 opacity-30 pointer-events-none transition-all duration-500">
                    <div class="flex items-center gap-4">
                        <input type="range" id="interval-range" min="1" max="60" value="10" class="flex-1">
                        <span id="interval-display" class="font-bold text-rose-500 bg-rose-500/10 px-3 py-1 rounded-lg">10m</span>
                    </div>
                    <div class="h-1.5 w-full bg-slate-200/50 dark:bg-white/10 rounded-full overflow-hidden">
                        <div id="timer-progress" class="h-full bg-rose-500 w-0 transition-all duration-1000 linear"></div>
                    </div>
                </div>
            </div>

            <!-- Notification History Card -->
            <div class="glass-card rounded-[2rem] p-8 flex flex-col h-[200px]">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-sm uppercase tracking-widest opacity-50">Recent Sparks</h3>
                    <div class="w-2 h-2 rounded-full bg-green-500" id="live-indicator"></div>
                </div>
                <div id="notif-history" class="overflow-y-auto space-y-3 flex-1 pr-2">
                    <p class="text-[10px] italic opacity-40 text-center py-4">Your mindfulness history will appear here.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Enhanced Toast Notification -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 -translate-y-48 transition-all duration-700 glass-card px-6 py-4 rounded-[1.5rem] flex items-center gap-4 z-[100] border-rose-500/30 max-w-[90vw] md:max-w-md shadow-2xl">
        <div class="w-12 h-12 bg-rose-500 rounded-2xl flex items-center justify-center text-white shadow-lg shrink-0 pulse-accent">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        </div>
        <div class="min-w-0">
            <p class="text-[10px] font-bold text-rose-500 uppercase tracking-widest mb-0.5">Mindful Moment</p>
            <p id="toast-message" class="text-sm font-medium text-slate-800 dark:text-white leading-tight truncate">Believe in the person you are becoming.</p>
        </div>
        <button onclick="dismissToast()" class="ml-2 text-slate-400 hover:text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>

    <script>
        const library = {
            Growth: [
                "I am a work in progress and that is a beautiful thing.",
                "Every challenge is an invitation to expand my soul.",
                "I release the need for perfection and embrace the beauty of effort.",
                "My potential is not a destination, it is an ever-unfolding journey."
            ],
            Peace: [
                "I inhale calm, I exhale everything that no longer serves me.",
                "Peace is a choice I make in every breath.",
                "I am the storm's center—quiet, steady, and safe.",
                "I trust the timing of my life implicitly."
            ],
            Worth: [
                "My value is inherent. It cannot be earned or taken away.",
                "I am worthy of grand things, small joys, and everything in between.",
                "I honor my boundaries as an act of self-respect.",
                "I do not need to prove my worth to anyone, including myself."
            ],
            Power: [
                "I have the strength to weather any season of life.",
                "My voice matters, and my truth is worth speaking.",
                "I am the architect of my own happiness.",
                "I possess an inner light that no shadow can extinguish."
            ]
        };

        let backgroundWorker;
        let timerInterval;
        let timeLeft = 0;
        let totalTime = 0;
        let audioContext;

        // Initialize Background Logic
        const workerBlob = new Blob([`
            let t;
            self.onmessage = e => {
                if(e.data.action === 'start') {
                    let s = e.data.min * 60;
                    clearInterval(t);
                    t = setInterval(() => {
                        s--;
                        if(s <= 0) { self.postMessage('trigger'); s = e.data.min * 60; }
                    }, 1000);
                } else clearInterval(t);
            }
        `], { type: 'text/javascript' });
        backgroundWorker = new Worker(URL.createObjectURL(workerBlob));

        backgroundWorker.onmessage = () => {
            triggerFullNotification();
        };

        function updateTheme() {
            const hour = new Date().getHours();
            const body = document.body;
            const greeting = document.getElementById('greeting');
            const icon = document.getElementById('time-icon');

            if (!body || !greeting || !icon) return;

            body.classList.remove('theme-morning', 'theme-afternoon', 'theme-evening', 'dark');
            
            if (hour >= 5 && hour < 12) {
                body.classList.add('theme-morning');
                greeting.innerText = "Good Morning";
                icon.innerText = "🌅";
            } else if (hour >= 12 && hour < 18) {
                body.classList.add('theme-afternoon');
                greeting.innerText = "Good Afternoon";
                icon.innerText = "☀️";
            } else {
                body.classList.add('theme-evening', 'dark');
                greeting.innerText = "Good Evening";
                icon.innerText = "🌙";
            }
        }

        function playChime() {
            try {
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, audioContext.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioContext.currentTime + 0.1);
                
                gain.gain.setValueAtTime(0, audioContext.currentTime);
                gain.gain.linearRampToValueAtTime(0.1, audioContext.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1.5);
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.start();
                osc.stop(audioContext.currentTime + 1.5);
            } catch (e) {
                console.log("Audio play blocked or failed", e);
            }
        }

        function addToHistory(text) {
            const history = document.getElementById('notif-history');
            if (!history) return;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            if (history.querySelector('p.italic')) history.innerHTML = '';
            
            const item = document.createElement('div');
            item.className = 'flex items-start gap-3 p-3 rounded-xl bg-white/20 dark:bg-slate-800/20 fade-in';
            item.innerHTML = `
                <div class="w-1.5 h-1.5 rounded-full bg-rose-500 mt-1.5 shrink-0"></div>
                <div>
                    <p class="text-xs font-medium leading-tight">${text}</p>
                    <span class="text-[8px] uppercase tracking-widest opacity-40 font-bold">${time}</span>
                </div>
            `;
            history.prepend(item);
            
            if (history.children.length > 10) history.lastElementChild.remove();
        }

        function newAffirmation(specificQuote = null) {
            const textEl = document.getElementById('affirmation-text');
            const badgeEl = document.getElementById('category-badge');
            const focusStatEl = document.getElementById('focus-stat');
            
            if (!textEl || !badgeEl) return;

            let quote, cat;
            if (specificQuote) {
                quote = specificQuote;
                cat = "Mindfulness";
            } else {
                const categories = Object.keys(library);
                cat = categories[Math.floor(Math.random() * categories.length)];
                quote = library[cat][Math.floor(Math.random() * library[cat].length)];
            }

            textEl.style.opacity = 0;
            textEl.style.transform = "translateY(10px)";
            
            setTimeout(() => {
                badgeEl.innerText = cat;
                textEl.innerText = quote;
                textEl.style.opacity = 1;
                textEl.style.transform = "translateY(0)";
                if (focusStatEl) {
                    focusStatEl.innerText = `Focus: ${cat}`;
                }
            }, 400);

            return quote;
        }

        function speakAffirmation() {
            const textEl = document.getElementById('affirmation-text');
            if (!textEl) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(textEl.innerText);
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function dismissToast() {
            const toast = document.getElementById('toast');
            if (toast) toast.classList.add('-translate-y-48');
        }

        function testNotification() {
            triggerFullNotification("This is a test of your inner peace.");
        }

        async function triggerFullNotification(manualText = null) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            
            if (!toast || !toastMsg) return;

            const categories = Object.keys(library);
            const randomCat = categories[Math.floor(Math.random() * categories.length)];
            const randomQuote = manualText || library[randomCat][Math.floor(Math.random() * library[randomCat].length)];
            
            // 1. Audio
            playChime();

            // 2. Visual Toast
            toastMsg.innerText = randomQuote;
            toast.classList.remove('-translate-y-48');
            setTimeout(dismissToast, 8000);

            // 3. History
            addToHistory(randomQuote);

            // 4. System Notif
            if (Notification.permission === "granted") {
                new Notification("Mindful Space", {
                    body: randomQuote,
                    icon: 'https://img.icons8.com/ios-filled/100/f43f5e/lotus.png'
                });
            }

            // 5. Update Main UI
            newAffirmation(randomQuote);
        }

        const toggle = document.getElementById('timer-toggle');
        const range = document.getElementById('interval-range');
        const settings = document.getElementById('timer-settings');
        const display = document.getElementById('interval-display');
        const progress = document.getElementById('timer-progress');

        function startTimer() {
            if (!range || !progress) return;
            const mins = parseInt(range.value);
            totalTime = mins * 60;
            timeLeft = totalTime;
            clearInterval(timerInterval);
            
            backgroundWorker.postMessage({ action: 'start', min: mins });

            timerInterval = setInterval(() => {
                timeLeft--;
                const p = ((totalTime - timeLeft) / totalTime) * 100;
                progress.style.width = `${p}%`;
                if(timeLeft <= 0) timeLeft = totalTime;
            }, 1000);
        }

        if (toggle) {
            toggle.addEventListener('change', async (e) => {
                if (e.target.checked) {
                    const res = await Notification.requestPermission();
                    if(res === 'granted') {
                        if (settings) {
                            settings.style.opacity = '1';
                            settings.style.pointerEvents = 'auto';
                        }
                        startTimer();
                    } else {
                        e.target.checked = false;
                    }
                } else {
                    if (settings) {
                        settings.style.opacity = '0.3';
                        settings.style.pointerEvents = 'none';
                    }
                    clearInterval(timerInterval);
                    backgroundWorker.postMessage({ action: 'stop' });
                    if (progress) progress.style.width = '0%';
                }
            });
        }

        if (range) {
            range.addEventListener('input', (e) => {
                if (display) display.innerText = `${e.target.value}m`;
                if(toggle && toggle.checked) startTimer();
            });
        }

        window.onload = () => {
            updateTheme();
            newAffirmation();
            setInterval(updateTheme, 60000);
        };
    </script>
</body>
</html>
